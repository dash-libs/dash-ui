name: Weekly Release

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday 09:00 UTC
  workflow_dispatch:
    inputs:
      release_note:
        description: "Optional release note (shown in GitHub release body)"
        required: false
        default: ""

jobs:
  # ── Gate: tests must pass ────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]" pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=dashui --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Generate docs ────────────────────────────────────────────────────────
  docs:
    name: Generate API docs
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]" pdoc

      - name: Generate docs
        run: |
          pdoc dashui --output-dir docs/api --docformat google
          echo "Docs generated at $(date -u)" > docs/api/.generated

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/api/

  # ── Release: tag, GitHub release, commit docs ────────────────────────────
  release:
    name: Bump version & release
    runs-on: ubuntu-latest
    needs: [test, docs]
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatch pdoc

      - name: Bump patch version
        id: bump
        run: |
          current=$(hatch version)
          hatch version patch
          new=$(hatch version)
          echo "version=$new" >> $GITHUB_OUTPUT
          echo "prev_version=$current" >> $GITHUB_OUTPUT
          echo "Bumped $current → $new"

      - name: Regenerate docs into repo
        run: |
          pip install -e ".[dev]"
          pdoc dashui --output-dir docs/api --docformat google

      - name: Build wheel + sdist
        run: hatch build

      - name: Write release notes
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          PREV_VERSION: ${{ steps.bump.outputs.prev_version }}
          RELEASE_NOTE: ${{ github.event.inputs.release_note }}
        run: |
          cat > RELEASE_NOTES.md << EOF
          ## DashUI v${VERSION}

          **Released:** $(date -u '+%Y-%m-%d')
          **Previous:** v${PREV_VERSION}

          $( [ -n "${RELEASE_NOTE}" ] && echo "### Notes" && echo "${RELEASE_NOTE}" || true )

          ### What's included
          - All tests passing across Python 3.9, 3.10, 3.11, 3.12
          - API documentation regenerated (see \`docs/api/\`)
          - Published to PyPI and Databricks Marketplace

          ### Install
          \`\`\`bash
          pip install dash-uis==${VERSION}
          \`\`\`
          EOF

      - name: Commit version bump + docs to a release branch
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clean up any orphaned tag/branch from a previous partial run
          git push origin --delete "refs/tags/v${VERSION}" 2>/dev/null || true
          git push origin --delete "release/v${VERSION}" 2>/dev/null || true
          git tag -d "v${VERSION}" 2>/dev/null || true
          git checkout -b "release/v${VERSION}"
          git add .
          git commit -m "release: v${VERSION} — tests passed, docs updated"
          git tag "v${VERSION}"
          git push origin "release/v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          body_path: RELEASE_NOTES.md
          files: dist/*

      - name: Upload dist artifact for PyPI job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Open and auto-merge release PR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          gh pr create --base main --head "release/v${VERSION}" \
            --title "release: v${VERSION}" \
            --body "Automated release PR — tests passed, docs regenerated, version bumped to v${VERSION}." \
            2>/dev/null || true
          gh pr merge "release/v${VERSION}" --merge --admin --delete-branch

  # ── Publish to PyPI (Trusted Publisher / OIDC — no token needed) ─────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write   # required for OIDC trusted publisher
    environment:
      name: pypi
      url: https://pypi.org/project/dash-uis
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Package for Databricks Marketplace ───────────────────────────────────
  publish-databricks:
    name: Package for Databricks Marketplace
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.release.outputs.version }}"

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build Marketplace bundle
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mkdir -p marketplace-bundle/files

          cp dist/*.whl marketplace-bundle/files/

          cat > marketplace-bundle/files/DashUI_Quickstart.py << NBEOF
          # Databricks notebook source
          # MAGIC %md
          # MAGIC # DashUI v${VERSION} — Shared UI Components
          # MAGIC Install and use shared components in any dash-* notebook UI.

          # COMMAND ----------
          # MAGIC %pip install dash-uis==${VERSION}

          # COMMAND ----------
          dbutils.library.restartPython()

          # COMMAND ----------
          import dashui
          dashui.header("Example", library="dashsynthetic", emoji="🧬")
          NBEOF

          cat > marketplace-bundle/listing.json << LEOF
          {
            "listing_name": "DashUI — Shared UI Components",
            "version": "${VERSION}",
            "short_description": "Shared ipywidgets components for every Dashlibs notebook UI",
            "long_description": "DashUI provides reusable ipywidgets building blocks (headers, source pickers, output panels, schema introspection) used across the Dashlibs suite of Databricks libraries.",
            "categories": ["Developer Tools", "Data Engineering"],
            "tags": ["databricks", "ipywidgets", "ui", "components"],
            "provider": "dash-libs",
            "documentation_url": "https://github.com/dash-libs/dash-ui",
            "source_url": "https://github.com/dash-libs/dash-ui",
            "pypi_package": "dash-uis==${VERSION}"
          }
          LEOF

          cd marketplace-bundle && zip -r ../dashui-marketplace-${VERSION}.zip .
          echo "Bundle created: dashui-marketplace-${VERSION}.zip"

      - name: Upload Marketplace bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-bundle
          path: dashui-marketplace-*.zip
          retention-days: 90
